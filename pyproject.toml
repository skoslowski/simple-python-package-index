[build-system]
build-backend = "hatchling.build"
requires = ["hatchling"]

[project]
authors = [{ name = "Sebastian Koslowski", email = "s.koslowski@procitec.de" }]
dependencies = [
  "pydantic_settings",
  "natsort",
  "packaging",
  "furl",
  "litestar[standard]",
  "msgspec",
]
description = 'Simple Python Package Index Server'
version = "0.1.0"
license = "MIT"
name = "sppi-server"
requires-python = ">=3.12"
readme = "README.md"

[tool.hatch]
build.sources = ["src"]

[tool.ruff]
extend-select = [
  "I",  # isort
  "UP", # pyupgrade
  "PT", # flake8-pytest-style
]
line-length = 110
