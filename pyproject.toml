[build-system]
build-backend = "hatchling.build"
requires = ["hatchling"]

[project]
authors = [
  {name = "Sebastian Koslowski", email = "s.koslowski@procitec.de"},
]
dependencies = [
  "pydantic_settings",
  "airium",
  "natsort",
  "packaging",
  "furl",
  "litestar[standard]",
  "msgspec"
]
description = 'Simple PEP503 index for python packages'
dynamic = ["version"]
license = "MIT"
name = "simple-python-package-index"
requires-python = ">=3.11"
readme = "README.md"

[tool.hatch]
build.sources = ["src"]
version.path = "src/simple_python_package_index/__init__.py"


[tool.black]
line-length = 100

[tool.ruff] # https://docs.astral.sh/ruff/rules/
extend-select = [
  "I", # isort
  "UP", # pyupgrade
  "PT", # flake8-pytest-style
]
line-length = 110
